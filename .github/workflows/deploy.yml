name: Deploy to TimeWeb VPS

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'locales/**'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e
            cd /var/www/eiva

            echo "[1/4] Pulling latest code..."
            git pull origin main

            echo "[2/4] Installing dependencies..."
            eiva-bot/venv/bin/pip install -r requirements.txt -q
            eiva-bot/venv/bin/pip install fastapi "uvicorn[standard]" python-multipart -q

            echo "[3/4] Restarting services..."
            pkill -f "bot.py" || true
            pkill -f "uvicorn api:app" || true
            sleep 3

            mkdir -p logs
            nohup eiva-bot/venv/bin/python3 bot.py >> logs/bot.log 2>&1 </dev/null &
            BOT_PID=$!
            echo $BOT_PID > /tmp/eiva-bot.pid

            nohup eiva-bot/venv/bin/python3 -m uvicorn api:app --host 127.0.0.1 --port 8000 >> logs/api.log 2>&1 </dev/null &
            API_PID=$!
            echo $API_PID > /tmp/eiva-api.pid

            echo "[4/4] Checking processes..."
            sleep 4
            kill -0 $BOT_PID 2>/dev/null && echo "Bot: OK (pid $BOT_PID)" || echo "Bot: FAILED"
            kill -0 $API_PID 2>/dev/null && echo "API: OK (pid $API_PID)" || echo "API: FAILED"
            echo "Deploy done at $(date)"

      - name: Notify success
        if: success()
        run: echo "✅ Deployed successfully"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deploy failed — check GitHub Actions log"
