name: Deploy to TimeWeb VPS

on:
  push:
    branches: [ main ]
    paths:
      # Trigger when backend Python code or config changes
      - '**.py'
      - 'requirements.txt'
      - 'locales/**'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            cd /var/www/eiva
            git pull origin main

            source eiva-bot/venv/bin/activate
            pip install -r requirements.txt -q
            pip install fastapi "uvicorn[standard]" python-multipart -q
            deactivate

            # Graceful restart — kill old, start fresh
            pkill -f "python3 bot.py" 2>/dev/null || true
            pkill -f "uvicorn api:app" 2>/dev/null || true
            sleep 2

            mkdir -p logs
            nohup python3 bot.py >> logs/bot.log 2>&1 &
            echo $! > /tmp/eiva-bot.pid

            nohup python3 -m uvicorn api:app --host 127.0.0.1 --port 8000 --workers 2 >> logs/api.log 2>&1 &
            echo $! > /tmp/eiva-api.pid

            sleep 3
            kill -0 $(cat /tmp/eiva-bot.pid) 2>/dev/null && echo "Bot: OK" || echo "Bot: FAILED"
            kill -0 $(cat /tmp/eiva-api.pid) 2>/dev/null && echo "API: OK" || echo "API: FAILED"

      - name: Notify success
        if: success()
        run: echo "✅ Deployed to TimeWeb VPS successfully"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed — check VPS logs"
